<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <title>Disk Ovos - Parque Novo Mundo</title>
</head>

<body>
  <header class="header-container">
    <div class="header container">
      <a href="/">
        <img src="./img/logotipo-disk-ovos.svg" alt="Logotipo Disk Ovos">
      </a>

      <nav>
        <ul class="menu-superior font-lf-5">
          <li><a href="#ovos">OVOS</a></li>
          <li><a href="#empresa">A EMPRESA</a></li>
          <li><a href="#depoimentos">DEPOIMENTOS</a></li>
          <li><a href="#comprar-ovos" class="btn-menu">COMPRAR OVOS <img src="./img/icone-btn-whatsapp.svg"
                alt="Ícone WhatsApp"></a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- FRETE GRÁTIS -->
  <section class="frete-gratis-container">
    <div class="frete-gratis">
      <img src="./img/icone-frete-gratis.svg" alt="Ícone Frete Grátis">
      <p class="font-ns-6 cor-branco">Entrega Grátis na região do Parque Novo Mundo!</p>
    </div>
  </section>

  <!-- HERO -->
  <section class="hero-container">
    <div class="hero container">
      <div class="h1-container">
        <h1 class="font-lf-1 cor-c12">Comprar Ovos no Parque Novo Mundo</h1>
        <p class="font-lf-2 cor-c9">nunca foi tão fácil!</p>
      </div>

      <div class="desc-img-container">
        <div class="desc-hero">
          <p class="font-ns-2 cor-c9"><span class="enfoque-desc">Ovos fresquinhos, direto da granja.</span> Venha até
            nossa
            loja ou compre
            pelo WhatsApp e
            receba em
            casa.</p>
          <a href="#comprar-ovos" class="btn-comprar-ovos cor-p12 font-lf-5">COMPRAR OVOS <img
              src="./img/icone-btn-whatsapp.svg" alt="Ícone WhatsApp"></a>
        </div>
        <div class="img-hero">
          <img src="./img/foto-cesta-ovos-hero.webp" alt="Cesta de Ovos">
        </div>
      </div>
    </div>
  </section>
</body>

</html>
